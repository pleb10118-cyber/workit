{% load static %}
<link rel="stylesheet" href="{% static 'styles/navbar.css' %}">
<div class="nav">
  <input type="checkbox" id="nav-check">
  <div class="nav-header">
  </div>
  <div class="nav-btn">
    <label for="nav-check">
      <span></span>
      <span></span>
      <span></span>
    </label>
  </div>
  
  <div class="nav-links">
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'shop' %}">Shop</a>
    <a href="{% url 'retailers' %}">Retailers</a>
    {% if request.user.is_authenticated and request.user.profile.is_retailer %}
      <a href="{% url 'dashboard' %}">Dashboard</a>
    {% endif %}
    <a href="{% url 'account' %}">Account</a>
    <a href="{% url 'support' %}">Support</a>
    <a href="{% url 'cart' %}"><img src="{% static 'cloth/images/cart.svg' %}" alt="Cart" style="width: 24px; height: 24px;"></a>
    {% if request.user.is_authenticated %}
      <a href="{% url 'logout' %}">Logout</a>
    {% else %}
      <a href="{% url 'login' %}">Login</a>
    {% endif %}
  </div>
</div>
